# Logging Configuration
# OceanView Reservation System

# Log Levels: OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL
.level=INFO

# Console Handler
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Console Handler Configuration
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# File Handler Configuration
java.util.logging.FileHandler.level=ALL
java.util.logging.FileHandler.pattern=logs/oceanview-reservation-%u-%g.log
java.util.logging.FileHandler.limit=10000000
java.util.logging.FileHandler.count=10
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.append=true

# Formatter Configuration
# Format: [Date Time] [Level] Message
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] [%4$-7s] [%2$s] %5$s %n

# Package Level Logging
com.oceanview.level=FINE
com.oceanview.controller.level=INFO
com.oceanview.service.level=INFO
com.oceanview.dao.level=INFO
com.oceanview.util.level=INFO
com.oceanview.filter.level=INFO

# Business Logic Logging
com.oceanview.security.login.level=INFO
com.oceanview.business.reservation.level=INFO
com.oceanview.business.rules.level=WARNING

# System Logging
com.oceanview.database.level=WARNING
com.oceanview.validation.level=WARNING
com.oceanview.security.auth.level=WARNING
com.oceanview.security.authz.level=WARNING
com.oceanview.web.request.level=INFO
com.oceanview.application.level=SEVERE
com.oceanview.system.level=INFO
com.oceanview.performance.level=FINE
